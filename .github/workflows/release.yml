name: Release

# Builds installable bundles and attaches them to a GitHub Release whenever a
# v* tag is pushed. workflow_dispatch runs the same builds without publishing
# (a dry run for the packaging itself).
#
# Release flow:
#   ./scripts/release.sh 0.2.0   # bump + commit + tag + push
# then publish the draft release once all jobs finish.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Creates the draft release up front — with a changelog generated from the
  # commits since the previous tag — so the build jobs upload into one
  # authoritative release instead of racing to create it.
  create-release:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog can diff against the previous tag

      - name: Verify tag matches app version
        run: |
          APP_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "v$APP_VERSION" != "${{ github.ref_name }}" ]; then
            echo "Tag ${{ github.ref_name }} does not match tauri.conf.json version v$APP_VERSION" >&2
            exit 1
          fi

      - name: Build release notes
        run: |
          PREV=$(git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>/dev/null || true)
          {
            echo "## Installers"
            echo
            echo "| Platform | File |"
            echo "|---|---|"
            echo "| Ubuntu / Debian | \`.deb\` |"
            echo "| Other Linux | \`.AppImage\` (portable), \`.rpm\` |"
            echo "| macOS (Apple Silicon + Intel) | \`.dmg\` |"
            echo "| Windows | \`.msi\` or \`.exe\` |"
            echo
            echo "## Changes"
            echo
            if [ -n "$PREV" ]; then
              git log --pretty="- %s" "$PREV..${{ github.ref_name }}"
            else
              git log --pretty="- %s" "${{ github.ref_name }}"
            fi
          } > /tmp/notes.md
          cat /tmp/notes.md

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.GITHUB_REF_NAME,
              name: `Lattice ${process.env.GITHUB_REF_NAME}`,
              body: fs.readFileSync("/tmp/notes.md", "utf8"),
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    # Run even when create-release is skipped (workflow_dispatch dry run),
    # but not when it failed or was cancelled.
    if: ${{ !failure() && !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ubuntu-22.04 (not -latest): older glibc → bundles run on more distros.
          # Produces .deb, .rpm and .AppImage.
          - platform: ubuntu-22.04
            args: ""
          # One universal .dmg/.app for both Apple Silicon and Intel.
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          # .msi (WiX) and .exe (NSIS) installers.
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # pnpm version comes from packageManager in package.json — setting one
      # here too makes the action error out.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Tag-scoped caches can never be restored by later tags — only
          # main's caches can (cache-warm.yml maintains those). Don't waste
          # cache storage saving from release runs.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Empty on workflow_dispatch: build only, no release upload.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
