name: Release

# Builds installable bundles and attaches them to a GitHub Release whenever a
# v* tag is pushed. workflow_dispatch runs the same builds without publishing
# (a dry run for the packaging itself).
#
# Release flow:
#   1. bump `version` in src-desktop/src-tauri/tauri.conf.json (and
#      src-desktop/package.json to match)
#   2. commit, then: git tag v0.2.0 && git push origin v0.2.0
#   3. publish the draft release that appears on GitHub once all jobs finish
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ubuntu-22.04 (not -latest): older glibc → bundles run on more distros.
          # Produces .deb, .rpm and .AppImage.
          - platform: ubuntu-22.04
            args: ""
          # One universal .dmg/.app for both Apple Silicon and Intel.
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          # .msi (WiX) and .exe (NSIS) installers.
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches app version
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          APP_VERSION=$(node -p "require('./src-desktop/src-tauri/tauri.conf.json').version")
          if [ "v$APP_VERSION" != "${{ github.ref_name }}" ]; then
            echo "Tag ${{ github.ref_name }} does not match tauri.conf.json version v$APP_VERSION" >&2
            exit 1
          fi

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: src-desktop/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-desktop/src-tauri
          # Tag-scoped caches can never be restored by later tags — only
          # main's caches can (cache-warm.yml maintains those). Don't waste
          # cache storage saving from release runs.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: src-desktop

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-desktop
          # Only cut a release for tag pushes; plain dispatch just builds.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Lattice {0}', github.ref_name) || '' }}
          releaseBody: "Download the installer for your platform below."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
